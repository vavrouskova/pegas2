# ============================================
# Dokploy Deployment Configuration - Frontend
# ============================================
# Used by Dokploy for production deployment.
# Image is pulled from GitLab Container Registry.
#
# Domain (configure in Dokploy UI):
#   - discomp.cz → frontend service, port 3000
#
# Build-time args (set when building image in CI/CD):
#   NEXT_PUBLIC_BACKEND_URL=https://api.discomp.cz
#   NEXT_PUBLIC_FRONTEND_URL=https://discomp.cz
#
# Runtime environment variables (configure in Dokploy UI if needed):
#   NODE_ENV, PORT, HOSTNAME, NEXT_TELEMETRY_DISABLED

services:
  frontend:
    image: ${IMAGE:-registry.antstudio.cz/react/pegas:latest}
    pull_policy: always
    restart: unless-stopped
    networks:
      - dokploy-network
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "require(''http'').get(''http://localhost:3000/api/health'', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    labels:
      - 'dokploy.enable=true'

networks:
  dokploy-network:
    external: true
