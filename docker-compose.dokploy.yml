# ============================================
# Dokploy Deployment Configuration - Frontend
# ============================================
# Two services separated by environment/branch.
# Each has its own DOKPLOY_COMPOSE_ID and DOKPLOY_WEBHOOK_URL in GitLab CI.
#
# Production (main/master):
#   - discomp.cz → frontend-production, port 3000
#
# Development:
#   - dev.discomp.cz → frontend-development, port 3000

x-healthcheck: &healthcheck
  test:
    [
      'CMD-SHELL',
      'node -e "require(''http'').get(''http://localhost:3000/api/health'', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"',
    ]
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 40s

services:
  frontend-production:
    image: ${IMAGE_PRODUCTION:-registry.antstudio.cz/react/pegas:production}
    pull_policy: always
    restart: unless-stopped
    networks:
      - dokploy-network
    healthcheck: *healthcheck
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    labels:
      - 'dokploy.enable=true'

  frontend-development:
    image: ${IMAGE_DEVELOPMENT:-registry.antstudio.cz/react/pegas:latest}
    pull_policy: always
    restart: unless-stopped
    networks:
      - dokploy-network
    healthcheck: *healthcheck
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    labels:
      - 'dokploy.enable=true'

networks:
  dokploy-network:
    external: true
