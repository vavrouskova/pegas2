services:
  wordpress:
    networks:
      - wordpress_network
      - nginx_network
    image: wordpress:6.6.1-php8.3-apache
    restart: always
    expose:
      - "587/tcp"
    environment:
      WORDPRESS_DB_HOST: ${DB_HOST}
      WORDPRESS_DB_USER: ${DB_USER}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD}
      WORDPRESS_DB_NAME: ${DB_DATABASE_NAME}
    volumes:
      - wordpress:/var/www/html

  db:
    networks:
      - wordpress_network
    image: mariadb:latest
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_DATABASE_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_RANDOM_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db:/var/lib/mysql

  adminer:
    image: shyim/adminerevo
    networks:
      - wordpress_network
      - nginx_network
    command: ["php", "-d", "post_max_size=500M", "-d", "upload_max_filesize=500M", "-S", "0.0.0.0:8080", "-t", "/var/www/html"]

networks:
  nginx_network:
    external: true
    driver: bridge
  wordpress_network:
    name: "${STACK_NAME}_wordpress_network"
    driver: bridge

volumes:
  wordpress:
  db:
